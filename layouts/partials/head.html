<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>
	{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}
</title>

<script>
	(function () {
		try {
			var saved = localStorage.getItem("theme");
			if (saved === "dark" || saved === "light") {
				document.documentElement.dataset.theme = saved;
			}
		} catch (e) { }
	})();
</script>

<link rel="stylesheet" href='{{ "css/main.css" | relURL }}' />

<!-- Favicon & icons -->
<link rel="shortcut icon" href='{{ "images/favicon.ico" | relURL }}'>
<link rel="icon" type="image/png" sizes="32x32" href='{{ "images/favicon-32x32.png" | relURL }}'>
<link rel="icon" type="image/png" sizes="16x16" href='{{ "images/favicon-16x16.png" | relURL }}'>
<link rel="apple-touch-icon" sizes="180x180" href='{{ "images/apple-touch-icon.png" | relURL }}'>
<link rel="icon" type="image/png" sizes="192x192" href='{{ "images/android-chrome-192x192.png" | relURL }}'>
<link rel="icon" type="image/png" sizes="512x512" href='{{ "images/android-chrome-512x512.png" | relURL }}'>
<link rel="manifest" href='{{ "site.webmanifest" | relURL }}'>

<meta name="msapplication-TileColor" content="#2563eb">
<meta name="theme-color" content="#ffffff">

<meta name="description"
	content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="keywords" content="{{ .Site.Params.keywords }}">
<meta name="author" content="{{ .Site.Params.author }}">

<!-- Open Graph / Social sharing -->
<meta property="og:title"
	content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}">
<meta property="og:description"
	content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content='{{ "images/logo-light.png" | relURL }}'>

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title"
	content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}">
<meta name="twitter:description" content="{{ .Site.Params.description }}">
<meta name="twitter:image" content='{{ "images/logo-light.png" | relURL }}'>
