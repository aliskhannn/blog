baseURL: "https://aliskhan.ru/"
languageCode: "ru-RU"
defaultContentLanguage: "ru"
title: "Aliskhan's Blog"

enableRobotsTXT: true

pagination:
  pagerSize: 10

params:
  author: "Aliskhan Khutiev"
  info: "Go Backend Developer"
  description: "Заметки про Go, backend и проекты."
  keywords: "golang, go, backend, backend developer, go backend, microservices, clean architecture, REST API, PostgreSQL, Redis, Kafka, RabbitMQ, docker, distributed systems, software engineering, programming blog"
  logoLight: "images/logo-light.png"
  logoDark: "images/logo-dark.png"

  social:
    email: "aliskhandev@gmail.com"
    telegram: "https://t.me/aliskhannn"
    github: "https://github.com/aliskhannn"



sitemap:
  changefreq: "weekly"
  priority: 0.5
